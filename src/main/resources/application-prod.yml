server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: student-management-system

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC


management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus

  endpoint:
    health:
      show-details: when-authorized


logging:
  level:
    root: WARN
    com.sridhar.springboot: INFO
    org.hibernate.SQL: WARN